<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./estilo.css">
    <title>Document</title>
    <link rel="stylesheet" href="estilo.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<body>

    <header class="header">
        <h1 class="logo">JoseLuis</h1>
        <nav class="navbar">
            <a href="inicio.html"><i class="fa-solid fa-house"></i>Inicio</a>
            <a href="Sobremi.html"> <i class="fa-solid fa-user-secret"></i>Sobre Mi</a>
            <a href="Tecnologias.html"><i class="fa-solid fa-laptop-file"></i>Tecnologias</a>
            <a href="Proyectos.html"><i class="fa-solid fa-box-archive"></i>Proyectos</a>
            <a href="Contacto.html"><i class="fa-solid fa-box-archive"></i>Contacto</a>
        </nav>
    </header>

    <section class="formulariocontacto">
        <div class="form-wrapper">
        <form action="https://formsubmit.co/totherrerajoseluis@gmail.com" method="POST">
            <h2>Contacto</h2><br>
            <div class="input-group">
                <label for="name"><i class="fa-solid fa-user" style="color: rgb(124, 163, 230);"></i>  Nombre</label>
                <input type="text" name="name" id="name" placeholder="Ingresa tu nombre"><br>

                <label for="telefono"><i class="fa-solid fa-phone" style="color: rgb(124, 163, 230);"></i> Telefono</label>
                <input type="number" name="telefono" id="telefono" placeholder="Ingresa tu telefono"><br>

                <label for="correo"><i class="fa-solid fa-envelope" style="color: rgb(124, 163, 230);"></i> Email</label>
                <input type="email" name="correo" id="correo" placeholder="Ingresa tu email"><br>

                <label for="mensaje"><i class="fa-solid fa-message" style="color: rgb(124, 163, 230);"></i>  Mensaje</label> <br>
                <textarea name="mensaje" id="mensaje" cols="30" rows="5" placeholder="Ingresa el mensaje a enviar"></textarea>

                <input class="btn" type="submit" value="Enviar">

                <input type="hidden" name="_next" value="https://127.0.0.1:5500">
                <input type="hidden" name="_captcha" value="false">
            </div>
        </form>
    </section>
</body>
</html>
